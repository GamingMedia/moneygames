let activeFilter = 'all';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGames();
}

function renderGames() {
  const q = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  const filtered = GAMES.filter(g => {
    const matchQ = !q || g.name.toLowerCase().includes(q) || (g.ThemeName && g.ThemeName.toLowerCase().includes(q));
    const matchF = activeFilter === 'all' ||
      (activeFilter === 'megaways' && g.megaways) ||
      (activeFilter === 'bonus' && g.bonus_buy) ||
      (activeFilter === 'progressive' && g.progressive);
    return matchQ && matchF;
  });
  document.getElementById('stats').textContent = `Showing ${filtered.length} of ${GAMES.length} games`;
  grid.innerHTML = filtered.length ? filtered.map(g => `
    <div class="card">
      <div class="card-img">
        <img src="${g.thumb}" alt="${g.name}" loading="lazy">
        <div class="badges">
          ${g.megaways ? '<span class="badge megaways">Megaways</span>' : ''}
          ${g.bonus_buy ? '<span class="badge bonus">Bonus Buy</span>' : ''}
          ${g.progressive ? '<span class="badge progressive">Progressive</span>' : ''}
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${g.name}</div>
        <div class="card-meta">
          ${g.ThemeName ? `<span class="meta-tag">${g.ThemeName}</span>` : ''}
          ${g.reels ? `<span class="meta-tag">${g.reels} Reels</span>` : ''}
          ${g.paylines ? `<span class="meta-tag">${g.paylines}</span>` : ''}
        </div>
        <a class="play-btn" href="${g.url}" target="_blank" rel="noopener">▶ Play Now</a>
      </div>
    </div>
  `).join('') : '<div class="no-results">No games found matching your search.</div>';
}

renderGames();
</script>
